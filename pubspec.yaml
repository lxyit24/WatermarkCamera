name: watermark_camera
description: "A watermark camera app for capturing photos with customizable watermarks"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  path_provider: ^2.1.4
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  image_gallery_saver_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
